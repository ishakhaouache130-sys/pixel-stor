<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Gaming | طلب لعبة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #121214;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #1a1a1e;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00efff;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00efff;
            text-transform: uppercase;
        }
        .logo span {
            color: #fff;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover {
            color: #00efff;
        }
        .form-container {
            max-width: 600px;
            width: 90%;
            margin: 50px auto;
            background-color: #1a1a1e;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #2d2d35;
        }
        .form-container h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #00efff;
        }
        .form-container p {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background-color: #121214;
            border: 2px solid #2d2d35;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, #00efff, #0088ff);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            background-color: #0e0e10;
            text-align: center;
            padding: 25px;
            margin-top: auto;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #1a1a1e;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Pixel <span>Gaming</span></div>
        <nav>
            <a href="/pixel-stor/index.html">الرئيسية</a>
            <a href="/pixel-stor/index.html">ألعاب كمبيوتر</a>
            <a href="/pixel-stor/index.html">ألعاب هواتف</a>
            <a href="#">طلب لعبة</a>
        </nav>
    </header>

    <main class="form-container">
        <h1>اطلب لعبتك المفضلة 🎮</h1>
        <p>اكتب اسم اللعبة بالأسفل وسنقوم بتوفيرها برابط مباشر في أقرب وقت!</p>
        
        <form action="https://formspree.io/f/xojoyqrn" method="POST">
            <div class="form-group">
                <label for="game-name">اسم اللعبة المطلوب:</label>
                <input type="text" id="game-name" name="game_name" required placeholder="مثال: GTA San Andreas">
            </div>
            <div class="form-group">
                <label for="device">الجهاز المراد تشغيل اللعبة عليه:</label>
                <select id="device" name="device_type">
                    <option value="PC">كمبيوتر (PC)</option>
                    <option value="Android">أندرويد (Android)</option>
                    <option value="iPhone">آيفون (iOS)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">ملاحظات إضافية (اختياري):</label>
                <textarea id="notes" name="notes" rows="4" placeholder="اكتب أي تفاصيل أخرى هنا..."></textarea>
            </div>
            <button type="submit" class="submit-btn">إرسال الطلب الآن</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Pixel Gaming. جميع الحقوق محفوظة لشبكة تحميل الألعاب.</p>
    </footer>

</body>
</html>
